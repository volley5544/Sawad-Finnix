name: Deploy Firebase Hosting

# UAT: deploys on every push to the uat branch (auto-deploy on change).
# PROD: deploys on push to the prod branch, a version tag (v*), or a manual run.
on:
  push:
    branches: [uat, prod]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (uat or prod)'
        required: true
        default: 'uat'
        type: choice
        options: [uat, prod]

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  # ---- UAT: every push to the uat branch -----------------------------------
  deploy-uat:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/uat') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.environment == 'uat')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release --dart-define=ENV=uat
      - name: Deploy to sawad-finnix-uat
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project sawad-finnix-uat \
            --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # ---- PROD: on prod branch push, tag push, or manual dispatch -------------
  deploy-prod:
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/prod') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.environment == 'prod')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release --dart-define=ENV=prod
      - name: Deploy to sawad-finnix
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project sawad-finnix \
            --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
