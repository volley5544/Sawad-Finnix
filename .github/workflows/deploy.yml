name: Deploy Firebase Hosting

# UAT: deploys on every push to the main branch (auto-deploy on change).
# PROD: deploys only on a version tag (v*) or a manual run.
on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (uat or prod)'
        required: true
        default: 'uat'
        type: choice
        options: [uat, prod]

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  # ---- UAT: every push to main/master --------------------------------------
  deploy-uat:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release --dart-define=ENV=uat
      - name: Deploy to sawad-finnix-uat
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project sawad-finnix-uat \
            --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # ---- PROD: on tag push or manual dispatch with environment=prod ----------
  deploy-prod:
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.environment == 'prod')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release --dart-define=ENV=prod
      - name: Deploy to sawad-finnix
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project sawad-finnix \
            --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
