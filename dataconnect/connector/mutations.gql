# LoanAccountRepository — mock approval (Loan.approved).
mutation ApproveLoan(
  $id: String!
  $userId: String!
  $thaiId: String
  $principal: Float!
  $annualInterestRate: Float!
  $termMonths: Int!
  $totalPayable: Float!
  $installmentAmount: Float!
  $startedAt: Timestamp!
) @auth(level: USER, insecureReason: "Case study: anonymous auth cannot bind to the owner; tighten to per-user filters once custom tokens exist") {
  loan_insert(
    data: {
      id: $id
      userId: $userId
      thaiId: $thaiId
      principal: $principal
      annualInterestRate: $annualInterestRate
      termMonths: $termMonths
      totalPayable: $totalPayable
      installmentAmount: $installmentAmount
      startedAt: $startedAt
      paidAmount: 0
      status: "active"
    }
  )
}

# LoanAccountRepository.pay — records a payment AND updates the loan in ONE
# operation. In Firestore this was two separate writes (doc.set + payments.add);
# here both run together (a real relational advantage: atomicity).
mutation RecordPayment(
  $loanId: String!
  $amount: Float!
  $outstandingAfter: Float!
  $installmentsPaid: Int!
  $newPaidAmount: Float!
  $status: String!
) @auth(level: USER, insecureReason: "Case study: anonymous auth cannot bind to the owner; tighten to per-user filters once custom tokens exist") {
  payment_insert(
    data: {
      loanId: $loanId
      amount: $amount
      outstandingAfter: $outstandingAfter
      installmentsPaid: $installmentsPaid
    }
  )
  loan_update(
    key: { id: $loanId }
    data: { paidAmount: $newPaidAmount, status: $status }
  )
}
